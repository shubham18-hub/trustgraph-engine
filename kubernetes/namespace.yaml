apiVersion: v1
kind: Namespace
metadata:
  name: trustgraph
  labels:
    name: trustgraph
    environment: production
    project: digital-shramsetu
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustgraph-sa
  namespace: trustgraph
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/trustgraph-eks-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trustgraph-role
  namespace: trustgraph
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trustgraph-rolebinding
  namespace: trustgraph
subjects:
- kind: ServiceAccount
  name: trustgraph-sa
  namespace: trustgraph
roleRef:
  kind: Role
  name: trustgraph-role
  apiGroup: rbac.authorization.k8s.io
