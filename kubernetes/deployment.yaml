apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustgraph-backend
  namespace: trustgraph
  labels:
    app: trustgraph
    component: backend
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: trustgraph
      component: backend
  template:
    metadata:
      labels:
        app: trustgraph
        component: backend
        version: v1
    spec:
      serviceAccountName: trustgraph-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: backend
        image: trustgraph/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: AWS_REGION
          value: "ap-south-1"
        - name: LOG_LEVEL
          value: "info"
        envFrom:
        - configMapRef:
            name: trustgraph-config
        - secretRef:
            name: trustgraph-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: trustgraph-data-pvc
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - trustgraph
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: trustgraph-backend
  namespace: trustgraph
  labels:
    app: trustgraph
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: trustgraph
    component: backend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trustgraph-config
  namespace: trustgraph
data:
  AWS_REGION: "ap-south-1"
  DATABASE_PATH: "/app/data/trustgraph.db"
  API_WORKERS: "4"
  REDIS_HOST: "trustgraph-redis"
  REDIS_PORT: "6379"
  METRICS_ENABLED: "true"
  VOICE_INTERFACE_ENABLED: "true"
  BLOCKCHAIN_ENABLED: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trustgraph-data-pvc
  namespace: trustgraph
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trustgraph-backend-hpa
  namespace: trustgraph
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trustgraph-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
