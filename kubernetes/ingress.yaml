apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustgraph-ingress
  namespace: trustgraph
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60
    alb.ingress.kubernetes.io/tags: Environment=production,Project=TrustGraph
spec:
  rules:
  - host: api.trustgraph.gov.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trustgraph-backend
            port:
              number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: trustgraph-redis
  namespace: trustgraph
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: trustgraph
    component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustgraph-redis
  namespace: trustgraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustgraph
      component: redis
  template:
    metadata:
      labels:
        app: trustgraph
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --requirepass
        - "$(REDIS_PASSWORD)"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgraph-secrets
              key: redis-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: trustgraph-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trustgraph-redis-pvc
  namespace: trustgraph
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp3
